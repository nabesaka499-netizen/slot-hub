<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e94560">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SLOT HUB">
<title>SLOT HUB</title>
<link rel="manifest" href="manifest.json">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#16213e;
    --accent:#e94560;--accent2:#f5a623;
    --text:#eee;--text2:#aaa;
    --card:#1e1e35;--card-hover:#252540;
    --radius:12px;--shadow:0 4px 20px rgba(0,0,0,.5);
  }
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;display:flex;flex-direction:column}

  /* HEADER */
  header{background:var(--bg2);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;border-bottom:1px solid #ffffff10;box-shadow:var(--shadow)}
  .logo{font-size:22px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logo span{font-size:11px;display:block;letter-spacing:3px;opacity:.7;font-weight:400;-webkit-text-fill-color:#aaa;margin-top:-2px}
  header .actions{margin-left:auto;display:flex;gap:8px}
  .icon-btn{background:none;border:1px solid #ffffff20;color:var(--text2);width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.2s}
  .icon-btn:hover,.icon-btn:active{background:var(--accent);border-color:var(--accent);color:#fff}

  /* SEARCH */
  .search-bar{padding:12px 16px;background:var(--bg2);border-bottom:1px solid #ffffff10}
  .search-bar input{width:100%;background:var(--bg3);border:1px solid #ffffff15;border-radius:8px;padding:9px 14px;color:var(--text);font-size:14px;outline:none;transition:.2s}
  .search-bar input:focus{border-color:var(--accent);background:var(--bg)}

  /* TABS */
  .tabs{display:flex;gap:0;background:var(--bg2);padding:0 16px;border-bottom:1px solid #ffffff10;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:10px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;user-select:none}
  .tab.active{color:var(--accent);border-color:var(--accent)}

  /* MAIN */
  main{flex:1;padding:16px;display:flex;flex-direction:column;gap:0}

  /* EMPTY */
  .empty{text-align:center;padding:60px 20px;color:var(--text2)}
  .empty .icon{font-size:48px;margin-bottom:16px;opacity:.4}
  .empty p{font-size:14px;line-height:1.6}

  /* GRID */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  @media(max-width:380px){.grid{grid-template-columns:repeat(2,1fr)}}

  /* CARD */
  .card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;border:1px solid #ffffff10;transition:.2s;position:relative;display:flex;flex-direction:column}
  .card:hover,.card:active{background:var(--card-hover);border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(233,69,96,.2)}
  .card-thumb{height:90px;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,var(--bg3),var(--bg2))}
  .card-body{padding:10px 12px;flex:1}
  .card-name{font-size:13px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-desc{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;background:var(--accent);color:#fff;margin-top:5px;opacity:.85}
  .card-actions{position:absolute;top:6px;right:6px;display:flex;gap:4px;opacity:0;transition:.2s}
  .card:hover .card-actions{opacity:1}
  .card-act{background:rgba(0,0,0,.6);border:none;color:#fff;width:24px;height:24px;border-radius:5px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
  .card-act:hover{background:var(--accent)}
  .card-fav{position:absolute;top:6px;left:8px;font-size:14px;opacity:.7}

  /* FAB */
  .fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 6px 24px rgba(233,69,96,.5);display:flex;align-items:center;justify-content:center;z-index:200;transition:.2s}
  .fab:hover,.fab:active{transform:scale(1.1)}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex}
  .modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:480px;animation:slideUp .25s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal h2{font-size:17px;margin-bottom:18px;text-align:center}
  .form-group{margin-bottom:14px}
  .form-group label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
  .form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);border:1px solid #ffffff15;border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none}
  .form-group input:focus,.form-group select:focus{border-color:var(--accent)}
  .form-group textarea{resize:none;height:60px}
  .form-group select option{background:var(--bg2)}
  .modal-btns{display:flex;gap:10px;margin-top:18px}
  .btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
  .btn-cancel{background:var(--bg3);color:var(--text2)}
  .btn-save{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}

  /* GOOGLE MODAL */
  .gmodal{border-radius:20px 20px 0 0;padding:24px 20px 40px}
  .gmodal .g-status{text-align:center;padding:20px 0;font-size:14px;color:var(--text2)}
  .gmodal .g-status .icon{font-size:40px;display:block;margin-bottom:10px}
  .gmodal input{margin-bottom:12px}
  .btn-google{background:#4285f4;color:#fff;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-google:hover{background:#357ae8}
  .btn-disconnect{background:var(--bg3);color:var(--accent);margin-top:8px;width:100%}

  /* TOAST */
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:.3s;z-index:500;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* EMOJI PICKER */
  .emoji-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .emoji-opt{font-size:22px;cursor:pointer;padding:4px;border-radius:6px;transition:.15s}
  .emoji-opt:hover,.emoji-opt.selected{background:var(--accent);transform:scale(1.2)}
</style>
</head>
<body>

<header>
  <div class="logo">SLOT HUB<span>SITE MANAGER</span></div>
  <div class="actions">
    <button class="icon-btn" id="btnDownload" title="バックアップ">⬇</button>
    <button class="icon-btn" id="btnDrive" title="Googleドライブ">☁</button>
  </div>
</header>

<div class="search-bar">
  <input type="search" id="searchInput" placeholder="サイトを検索...">
</div>

<div class="tabs" id="tabs"></div>

<main id="main"></main>

<button class="fab" id="fabAdd">＋</button>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h2 id="modalTitle">サイトを追加</h2>
    <div class="form-group">
      <label>サイト名 *</label>
      <input type="text" id="fName" placeholder="例: ジャグラーの神様">
    </div>
    <div class="form-group">
      <label>URL *</label>
      <input type="url" id="fUrl" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>説明（任意）</label>
      <textarea id="fDesc" placeholder="メモや説明"></textarea>
    </div>
    <div class="form-group">
      <label>カテゴリ</label>
      <select id="fCat">
        <option value="サブスク">サブスク</option>
        <option value="ノート">ノート</option>
      </select>
    </div>
    <div class="form-group">
      <label>アイコン絵文字</label>
      <div class="emoji-row" id="emojiRow"></div>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="fFav"> お気に入り ⭐</label>
    </div>
    <div class="modal-btns">
      <button class="btn btn-cancel" id="btnCancel">キャンセル</button>
      <button class="btn btn-save" id="btnSave">保存</button>
    </div>
  </div>
</div>

<!-- DRIVE MODAL -->
<div class="overlay" id="driveOverlay">
  <div class="modal gmodal">
    <h2>Googleドライブ連携</h2>
    <div id="driveStatus"></div>
    <div id="driveForm"></div>
    <div class="modal-btns" style="margin-top:12px">
      <button class="btn btn-cancel" id="btnDriveClose">閉じる</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const EMOJIS = ['🎰','🃏','🎲','🎯','🔥','⭐','💰','🏆','👑','💎','🌟','🎮','🎪','🎨','🚀'];
const STORAGE_KEY = 'slothub_sites';
const DRIVE_KEY = 'slothub_drive';

let sites = [];
let activeTab = 'すべて';
let editId = null;
let driveConfig = null;
let gapiReady = false;

// ---- DATA ----
function load() {
  try { sites = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { sites = []; }
  try { driveConfig = JSON.parse(localStorage.getItem(DRIVE_KEY)); } catch { driveConfig = null; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sites));
  driveSyncAuto();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ---- RENDER ----
function getCategories() {
  return ['すべて', 'お気に入り', 'サブスク', 'ノート'];
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  const cats = getCategories();
  if (!cats.includes(activeTab)) activeTab = 'すべて';
  tabsEl.innerHTML = cats.map(c =>
    `<div class="tab${c===activeTab?' active':''}" data-cat="${c}">${c}</div>`
  ).join('');
  tabsEl.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    activeTab = t.dataset.cat; renderTabs(); renderCards();
  }));
}

function filteredSites() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = sites;
  if (activeTab === 'お気に入り') list = list.filter(s => s.fav);
  else if (activeTab !== 'すべて') list = list.filter(s => s.cat === activeTab);
  if (q) list = list.filter(s => s.name.toLowerCase().includes(q) || (s.desc||'').toLowerCase().includes(q) || s.url.toLowerCase().includes(q));
  return list;
}

function renderCards() {
  const main = document.getElementById('main');
  const list = filteredSites();
  if (!list.length) {
    main.innerHTML = `<div class="empty"><div class="icon">${sites.length?'🔍':'🎰'}</div><p>${sites.length?'一致するサイトが見つかりません':'「＋」ボタンでスロットサイトを追加しよう！'}</p></div>`;
    return;
  }
  main.innerHTML = `<div class="grid">${list.map(cardHTML).join('')}</div>`;
  main.querySelectorAll('.card').forEach(el => {
    const id = el.dataset.id;
    el.addEventListener('click', e => {
      if (e.target.closest('.card-act')) return;
      const s = sites.find(x => x.id === id);
      if (s) window.open(s.url, '_blank');
    });
    el.querySelector('.card-act.edit')?.addEventListener('click', e => { e.stopPropagation(); openEdit(id); });
    el.querySelector('.card-act.del')?.addEventListener('click', e => { e.stopPropagation(); deleteSite(id); });
  });
}

function cardHTML(s) {
  return `<div class="card" data-id="${s.id}">
    ${s.fav ? '<span class="card-fav">⭐</span>' : ''}
    <div class="card-thumb">${s.icon || '🎰'}</div>
    <div class="card-body">
      <div class="card-name">${esc(s.name)}</div>
      ${s.desc ? `<div class="card-desc">${esc(s.desc)}</div>` : ''}
      <span class="card-tag">${esc(s.cat)}</span>
    </div>
    <div class="card-actions">
      <button class="card-act edit" title="編集">✏</button>
      <button class="card-act del" title="削除">✕</button>
    </div>
  </div>`;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ---- EDIT MODAL ----
function buildEmojiRow(selected) {
  const row = document.getElementById('emojiRow');
  row.innerHTML = EMOJIS.map(e =>
    `<span class="emoji-opt${e===selected?' selected':''}" data-e="${e}">${e}</span>`
  ).join('');
  row.querySelectorAll('.emoji-opt').forEach(el => el.addEventListener('click', () => {
    row.querySelectorAll('.emoji-opt').forEach(x => x.classList.remove('selected'));
    el.classList.add('selected');
  }));
}

function openAdd() {
  editId = null;
  document.getElementById('modalTitle').textContent = 'サイトを追加';
  document.getElementById('fName').value = '';
  document.getElementById('fUrl').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fCat').value = '攻略';
  document.getElementById('fFav').checked = false;
  buildEmojiRow('🎰');
  document.getElementById('editOverlay').classList.add('show');
  document.getElementById('fName').focus();
}

function openEdit(id) {
  const s = sites.find(x => x.id === id);
  if (!s) return;
  editId = id;
  document.getElementById('modalTitle').textContent = 'サイトを編集';
  document.getElementById('fName').value = s.name;
  document.getElementById('fUrl').value = s.url;
  document.getElementById('fDesc').value = s.desc || '';
  document.getElementById('fCat').value = s.cat;
  document.getElementById('fFav').checked = !!s.fav;
  buildEmojiRow(s.icon || '🎰');
  document.getElementById('editOverlay').classList.add('show');
}

function closeEdit() { document.getElementById('editOverlay').classList.remove('show'); }

document.getElementById('btnSave').addEventListener('click', () => {
  const name = document.getElementById('fName').value.trim();
  let url = document.getElementById('fUrl').value.trim();
  if (!name) { toast('サイト名を入力してください'); return; }
  if (!url) { toast('URLを入力してください'); return; }
  if (!url.startsWith('http')) url = 'https://' + url;
  const icon = document.querySelector('.emoji-opt.selected')?.dataset.e || '🎰';
  const site = { id: editId || uid(), name, url, desc: document.getElementById('fDesc').value.trim(), cat: document.getElementById('fCat').value, icon, fav: document.getElementById('fFav').checked };
  if (editId) { const i = sites.findIndex(x => x.id === editId); sites[i] = site; }
  else sites.unshift(site);
  save(); closeEdit(); renderTabs(); renderCards();
  toast(editId ? 'サイトを更新しました' : 'サイトを追加しました');
});

function deleteSite(id) {
  if (!confirm('このサイトを削除しますか？')) return;
  sites = sites.filter(x => x.id !== id);
  save(); renderTabs(); renderCards();
  toast('削除しました');
}

document.getElementById('fabAdd').addEventListener('click', openAdd);
document.getElementById('btnCancel').addEventListener('click', closeEdit);
document.getElementById('editOverlay').addEventListener('click', e => { if (e.target === document.getElementById('editOverlay')) closeEdit(); });

// ---- SEARCH ----
document.getElementById('searchInput').addEventListener('input', renderCards);

// ---- DOWNLOAD ----
document.getElementById('btnDownload').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(sites, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `slothub_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('バックアップをダウンロードしました');
});

// ---- TOAST ----
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// ---- GOOGLE DRIVE ----
document.getElementById('btnDrive').addEventListener('click', () => {
  renderDriveModal();
  document.getElementById('driveOverlay').classList.add('show');
});
document.getElementById('btnDriveClose').addEventListener('click', () => {
  document.getElementById('driveOverlay').classList.remove('show');
});
document.getElementById('driveOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('driveOverlay')) document.getElementById('driveOverlay').classList.remove('show');
});

function renderDriveModal() {
  const statusEl = document.getElementById('driveStatus');
  const formEl = document.getElementById('driveForm');
  if (driveConfig?.token) {
    statusEl.innerHTML = `<div class="g-status"><span class="icon">☁</span>接続中<br><small style="color:#4ade80">${driveConfig.email||''}</small></div>`;
    formEl.innerHTML = `<button class="btn btn-disconnect" id="btnDisconnect">接続解除</button>`;
    document.getElementById('btnDisconnect').addEventListener('click', () => {
      driveConfig = null; localStorage.removeItem(DRIVE_KEY); renderDriveModal(); toast('接続を解除しました');
    });
  } else {
    statusEl.innerHTML = `<div class="g-status"><span class="icon">☁</span>未接続</div>`;
    formEl.innerHTML = `
      <div class="form-group"><label>Google Cloud Client ID</label>
        <input type="text" id="gClientId" placeholder="xxxxxxxx.apps.googleusercontent.com" value="${driveConfig?.clientId||''}">
      </div>
      <button class="btn btn-google" id="btnGoogleSignIn">Googleでサインイン</button>`;
    document.getElementById('btnGoogleSignIn').addEventListener('click', googleSignIn);
  }
}

function googleSignIn() {
  const clientId = document.getElementById('gClientId').value.trim();
  if (!clientId) { toast('Client IDを入力してください'); return; }
  driveConfig = { clientId };
  const redirect = location.href.split('?')[0];
  const scope = 'https://www.googleapis.com/auth/drive.appdata';
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(clientId)}&redirect_uri=${encodeURIComponent(redirect)}&response_type=token&scope=${encodeURIComponent(scope)}`;
  window.location.href = url;
}

function handleOAuthCallback() {
  const hash = location.hash;
  if (!hash.includes('access_token')) return;
  const params = new URLSearchParams(hash.slice(1));
  const token = params.get('access_token');
  if (!token || !driveConfig) return;
  driveConfig.token = token;
  driveConfig.expires = Date.now() + parseInt(params.get('expires_in') || 3600) * 1000;
  localStorage.setItem(DRIVE_KEY, JSON.stringify(driveConfig));
  history.replaceState(null, '', location.pathname);
  toast('Googleドライブに接続しました');
  driveSyncAuto();
}

async function driveSyncAuto() {
  if (!driveConfig?.token) return;
  if (driveConfig.expires && Date.now() > driveConfig.expires) { driveConfig = null; localStorage.removeItem(DRIVE_KEY); return; }
  try {
    const data = JSON.stringify(sites);
    const blob = new Blob([data], { type: 'application/json' });
    const meta = JSON.stringify({ name: 'slothub_data.json', parents: ['appDataFolder'] });
    const form = new FormData();
    form.append('metadata', new Blob([meta], { type: 'application/json' }));
    form.append('file', blob);
    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST', headers: { Authorization: 'Bearer ' + driveConfig.token }, body: form
    });
  } catch(e) { /* silent */ }
}

// ---- PWA ----
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

// ---- INIT ----
load();
handleOAuthCallback();
renderTabs();
renderCards();
</script>
</body>
</html>
